x-app-env: &app-env
  APP_ENV: ${APP_ENV:-production}
  APP_KEY: ${APP_KEY}
  APP_DEBUG: ${APP_DEBUG:-false}
  APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Makassar}
  TZ: ${TZ:-Asia/Makassar}
  DB_CONNECTION: ${DB_CONNECTION}
  DB_HOST: ${DB_HOST}
  DB_PORT: ${DB_PORT}
  DB_DATABASE: ${DB_DATABASE}
  DB_USERNAME: ${DB_USERNAME}
  DB_PASSWORD: ${DB_PASSWORD}
  DB_SQLITE_DATABASE: ${DB_SQLITE_DATABASE:-}
  QUEUE_CONNECTION: ${QUEUE_CONNECTION}
  REDIS_CLIENT: predis
  REDIS_HOST: ${REDIS_HOST:-redis}

services:
  redis:
    image: redis:alpine
    container_name: media_intelligent_redis_container
    ports:
      - "6379:6379"
    restart: always

  postgres:
    image: postgres:16-alpine
    container_name: media_intelligent_postgres_container
    environment:
      TZ: ${TZ:-Asia/Makassar}
      PGTZ: ${TZ:-Asia/Makassar}
      POSTGRES_DB: media_intelligent
      POSTGRES_USER: media_intelligent
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  media-intelligent:
    build:
      context: .
      dockerfile: Dockerfile
    image: media_intelligent_app:latest
    container_name: media_intelligent_container
    ports:
      - "${APP_PORT:-80}:8000"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      - .:/var/web
    environment: *app-env
    restart: unless-stopped
    depends_on:
      - redis
      - postgres

  media-intelligent-worker:
    image: media_intelligent_app:latest
    container_name: media_intelligent_worker_container
    command: ["php", "artisan", "queue:work", "redis", "--queue=news", "--sleep=3", "--tries=3", "--timeout=300"]
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      - .:/var/web
    environment: *app-env
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  media-intelligent-scheduler:
    image: media_intelligent_app:latest
    container_name: media_intelligent_scheduler_container
    init: true
    command: ["php", "artisan", "schedule:work"]
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      - .:/var/web
    environment: *app-env
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  media-intelligent-apify-worker:
    image: media_intelligent_app:latest
    container_name: media_intelligent_apify_worker_container
    command: ["php", "artisan", "queue:work", "redis", "--queue=apify", "--sleep=5", "--tries=2", "--timeout=1000"]
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      - .:/var/web
    environment: *app-env
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  media-intelligent-ai-worker:
    image: media_intelligent_app:latest
    container_name: media_intelligent_ai_worker_container
    command: ["php", "artisan", "queue:work", "redis-ai", "--queue=ai-analysis,ai-backfill", "--sleep=3", "--tries=1", "--timeout=600"]
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      - .:/var/web
    environment: *app-env
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  media-intelligent-notification-worker:
    image: media_intelligent_app:latest
    container_name: media_intelligent_notification_worker_container
    command: ["php", "artisan", "queue:work", "redis", "--queue=notification", "--sleep=5", "--tries=2", "--timeout=120"]
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      - .:/var/web
    environment: *app-env
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
